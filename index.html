<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сон в менопаузе — 6-недельная CBT-I программа</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  input:focus { outline: none; border-color: #7c6fcd !important; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = Recharts;


// ─── helpers ───────────────────────────────────────────────────────────────
const gv = (id) => { const el = document.getElementById(id); return el ? el.value : ""; };
const gc = (id) => { const el = document.getElementById(id); return el ? el.checked : false; };

const LS_KEY = "sleep_program_v1";
const load = () => { try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch { return {}; } };
const save = (data) => localStorage.setItem(LS_KEY, JSON.stringify(data));

const WEEKS = [
  { n: 1, title: "Диагностика", icon: "🔍", color: "#7c6fcd" },
  { n: 2, title: "Ограничение сна", icon: "⏰", color: "#5b8dee" },
  { n: 3, title: "Контроль стимулов", icon: "🛏️", color: "#4ca8a8" },
  { n: 4, title: "Работа с мыслями", icon: "🧠", color: "#6a9f5c" },
  { n: 5, title: "Гигиена сна", icon: "🌿", color: "#c47f3a" },
  { n: 6, title: "Закрепление", icon: "⭐", color: "#b05a9e" },
];

const DISCLAIMER = "Программа носит образовательный характер и не является медицинской услугой.";

const WEEK_DESCRIPTIONS = {
  1: "7 дней ведения дневника сна. Данные помогут AI вычислить вашу эффективность сна и определить тип нарушения.",
  2: "Техника ограничения сна — ключевой инструмент CBT-I. AI назначит персональное терапевтическое окно.",
  3: "Переобучение мозга: кровать — только для сна. Жёсткий подъём. Правило 20 минут.",
  4: "Когнитивная работа: дневник беспокойств, парадоксальное намерение, остановка тревожных мыслей.",
  5: "Персональная гигиена сна в менопаузе: температура, свет, питание, тренировки через гормональный механизм.",
  6: "Последняя неделя — просто наблюдайте за сном без новых техник. Ведите дневник как обычно. AI проанализирует всю динамику за 6 недель и составит персональный план поддержания результата.",
};

// ─── AI call ───────────────────────────────────────────────────────────────
async function callAI(prompt, maxTokens = 1000) {
  const resp = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: maxTokens,
      messages: [{ role: "user", content: prompt }],
    }),
  });
  if (!resp.ok) throw new Error(`API error ${resp.status}`);
  const data = await resp.json();
  return data.content?.map(b => b.text || "").join("") || "";
}

// ─── sleep efficiency ──────────────────────────────────────────────────────
function calcEfficiency(entry) {
  try {
    if (!entry.bedTime || !entry.riseTime) return 0;
    const bedH = parseInt(entry.bedTime.split(":")[0]);
    const bedM = parseInt(entry.bedTime.split(":")[1]);
    const riseH = parseInt(entry.riseTime.split(":")[0]);
    const riseM = parseInt(entry.riseTime.split(":")[1]);
    let inBed = (riseH * 60 + riseM) - (bedH * 60 + bedM);
    if (inBed <= 0) inBed += 24 * 60;
    const sleepOnset = parseInt(entry.sleepOnset) || 0;
    const awakenings = (parseInt(entry.awakenings) || 0) * (parseInt(entry.awakeningDuration) || 0);
    const asleep = inBed - sleepOnset - awakenings;
    if (asleep <= 0 || inBed <= 0) return 0;
    return Math.round((asleep / inBed) * 100);
  } catch { return 0; }
}

// ─── Week 1 diary form ─────────────────────────────────────────────────────
function DiaryForm({ day, existing, onSave }) {
  const [form, setForm] = useState(existing || {
    bedTime: "", sleepOnset: "", awakenings: "",
    awakeningDuration: "", riseTime: "", quality: "5",
    hotFlashes: "0", stress: "5", thoughts: "",
  });

  const up = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const eff = calcEfficiency(form);

  return (
    <div style={{ background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 14, padding: 20, marginBottom: 12 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <span style={{ color: "#a89fe8", fontWeight: 600 }}>День {day}</span>
        {eff > 0 && <span style={{ background: eff >= 85 ? "#2d6a4f" : eff >= 75 ? "#865a1a" : "#6b2020", color: "#fff", borderRadius: 20, padding: "2px 10px", fontSize: 12 }}>Эффективность: {eff}%</span>}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
        {[
          ["bedTime", "Лечь в постель", "time"],
          ["riseTime", "Финальный подъём", "time"],
        ].map(([k, label, type]) => (
          <div key={k}>
            <label style={{ fontSize: 11, color: "#8888aa", display: "block", marginBottom: 4 }}>{label}</label>
            <input type={type} value={form[k]} onChange={e => up(k, e.target.value)}
              style={{ width: "100%", background: "rgba(255,255,255,0.07)", border: "1px solid rgba(255,255,255,0.15)", borderRadius: 8, padding: "6px 10px", color: "#e8e4f5", fontSize: 14, boxSizing: "border-box" }} />
          </div>
        ))}

        {[
          ["sleepOnset", "Засыпание (мин)", "0–120"],
          ["awakenings", "Пробуждений (раз)", "0–10"],
          ["awakeningDuration", "Время бодрствования (мин)", "0–120"],
        ].map(([k, label, placeholder]) => (
          <div key={k}>
            <label style={{ fontSize: 11, color: "#8888aa", display: "block", marginBottom: 4 }}>{label}</label>
            <input type="number" value={form[k]} placeholder={placeholder} onChange={e => up(k, e.target.value)}
              style={{ width: "100%", background: "rgba(255,255,255,0.07)", border: "1px solid rgba(255,255,255,0.15)", borderRadius: 8, padding: "6px 10px", color: "#e8e4f5", fontSize: 14, boxSizing: "border-box" }} />
          </div>
        ))}

        {[
          ["quality", "Качество сна", 10],
          ["stress", "Стресс вчера", 10],
          ["hotFlashes", "Приливы ночью", 10],
        ].map(([k, label, max]) => (
          <div key={k} style={{ gridColumn: k === "hotFlashes" ? "1 / -1" : "auto" }}>
            <label style={{ fontSize: 11, color: "#8888aa", display: "block", marginBottom: 4 }}>{label}: <b style={{ color: "#e8e4f5" }}>{form[k]}</b>{k !== "hotFlashes" ? "/10" : " шт."}</label>
            <input type="range" min="0" max={max} value={form[k]} onChange={e => up(k, e.target.value)}
              style={{ width: "100%", accentColor: "#7c6fcd" }} />
          </div>
        ))}
      </div>

      <button onClick={() => onSave(day, form)}
        style={{ marginTop: 14, width: "100%", background: "linear-gradient(135deg, #7c6fcd, #5b8dee)", border: "none", borderRadius: 10, padding: "10px", color: "#fff", fontWeight: 600, cursor: "pointer", fontSize: 14 }}>
        Сохранить день {day}
      </button>
    </div>
  );
}

// ─── Week checklist items ──────────────────────────────────────────────────
function CheckItem({ label, checked, onChange }) {
  return (
    <label style={{ display: "flex", alignItems: "flex-start", gap: 10, cursor: "pointer", padding: "8px 0", borderBottom: "1px solid rgba(255,255,255,0.05)" }}>
      <div onClick={onChange} style={{
        width: 20, height: 20, minWidth: 20, borderRadius: 6, border: "2px solid",
        borderColor: checked ? "#7c6fcd" : "rgba(255,255,255,0.2)",
        background: checked ? "#7c6fcd" : "transparent",
        display: "flex", alignItems: "center", justifyContent: "center", marginTop: 1
      }}>
        {checked && <span style={{ color: "#fff", fontSize: 12 }}>✓</span>}
      </div>
      <span style={{ fontSize: 14, color: checked ? "#c8c0f0" : "#8888aa", lineHeight: 1.4 }}>{label}</span>
    </label>
  );
}

// ─── AI Analysis block ─────────────────────────────────────────────────────
function AIBlock({ weekN, diaryData, extraData, allWeeksData, profile, onNextWeek, onResultReady }) {
  const [result, setResult] = useState("");
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState("");

  const buildPrompt = () => {
    const base = `Ты — специалист по когнитивно-поведенческой терапии бессонницы (CBT-I) с опытом работы с женщинами в менопаузе.
Отвечай строго на русском языке. Тон: тёплый, поддерживающий, конкретный.
${profile ? `Пациентка: ${profile.name}, ${profile.age} лет. Обращайся к ней по имени.` : ""}
ВАЖНО: укладывайся в лимит токенов, но каждая начатая мысль должна быть завершена полным предложением с точкой. Если не хватает места для нового пункта — не начинай его. Лучше меньше пунктов, но каждый закончен.`;

    const disclaimer = `\n\nВ конце ответа добавь дословно:\n«Снижение дофамина в период менопаузы делает формирование новых привычек по-настоящему трудным. Если вы соблюдаете рекомендации но не видите быстрого результата — это нормально. Изменения в архитектуре сна происходят постепенно. Продолжайте.»`;

    if (weekN === 6 && allWeeksData) {
      return `${base}
Проведи итоговый анализ 6-недельной программы CBT-I.

Данные по неделям:
${JSON.stringify(allWeeksData, null, 2)}

Формат ответа:
## 📊 ИТОГОВАЯ ДИНАМИКА
[динамика эффективности сна по неделям в цифрах, что изменилось]

## 🏆 ЧТО СРАБОТАЛО ЛУЧШЕ ВСЕГО
[конкретные техники с объяснением почему]

## 📋 ПЕРСОНАЛЬНЫЙ ПЛАН ПОДДЕРЖАНИЯ
[3-4 конкретных пункта]

## 🔄 ЕСЛИ БЕССОННИЦА ВЕРНЁТСЯ
[пошаговый алгоритм]

## 💫 ИТОГ
[личное обращение, что достигнуто]
${disclaimer}`;
    }

    const entries = diaryData ? Object.entries(diaryData).map(([day, d]) => {
      const eff = calcEfficiency(d);
      return `День ${day}: лечь ${d.bedTime}, засыпание ${d.sleepOnset}мин, пробуждений ${d.awakenings}×${d.awakeningDuration}мин, подъём ${d.riseTime}, качество ${d.quality}/10, приливы ${d.hotFlashes}, стресс ${d.stress}/10, эффективность ${eff}%`;
    }).join("\n") : "";

    return `${base}
Неделя ${weekN} программы CBT-I для пациентки в пременопаузе.

${entries ? `Дневник сна:\n${entries}\n` : ""}
${extraData ? `Дополнительные данные: ${JSON.stringify(extraData)}` : ""}

Формат ответа:
## 📊 АНАЛИЗ НЕДЕЛИ ${weekN}
[динамика в цифрах, что изменилось]

## 🎯 ЗАДАЧА НА СЛЕДУЮЩУЮ НЕДЕЛЮ
[конкретная техника с механизмом]

## ⏰ ВАШЕ ОКНО СНА
Ложитесь: [время]
Вставайте: [время]

## 💡 ПЕРСОНАЛЬНОЕ НАБЛЮДЕНИЕ
[одно наблюдение по её данным]
${disclaimer}`;
  };

  const run = async () => {
    setLoading(true); setErr(""); setResult("");
    try {
      const text = await callAI(buildPrompt(), weekN === 6 ? 2500 : 1000);
      setResult(text);
      if (onResultReady) onResultReady(text);
    } catch (e) {
      setErr("Ошибка соединения с AI. Проверьте интернет и попробуйте снова.");
    } finally { setLoading(false); }
  };

  const filledDays = diaryData ? Object.keys(diaryData).length : 0;
  const canAnalyze = weekN === 1 ? filledDays >= 5 : weekN === 6 ? true : filledDays >= 4;

  return (
    <div style={{ marginTop: 20, borderTop: "1px solid rgba(255,255,255,0.1)", paddingTop: 20 }}>
      <button onClick={run} disabled={loading || !canAnalyze}
        style={{
          width: "100%", padding: "14px", borderRadius: 12,
          background: canAnalyze ? "linear-gradient(135deg, #7c6fcd 0%, #5b8dee 100%)" : "rgba(255,255,255,0.05)",
          border: canAnalyze ? "none" : "1px solid rgba(255,255,255,0.1)",
          color: canAnalyze ? "#fff" : "#666", fontWeight: 700, fontSize: 15, cursor: canAnalyze ? "pointer" : "not-allowed",
          boxShadow: canAnalyze ? "0 4px 20px rgba(124,111,205,0.4)" : "none",
        }}>
        {loading ? "✨ Анализирую..." : canAnalyze ? `🤖 Получить анализ недели ${weekN}` : `Заполните ещё ${(weekN === 1 ? 5 : 4) - filledDays} дн.`}
      </button>
      {loading && (
        <div style={{ textAlign: "center", padding: 20 }}>
          <div style={{ display: "inline-block", width: 36, height: 36, border: "3px solid rgba(124,111,205,0.3)", borderTopColor: "#7c6fcd", borderRadius: "50%", animation: "spin 1s linear infinite" }} />
          <p style={{ color: "#8888aa", fontSize: 13, marginTop: 10 }}>AI анализирует ваши данные…</p>
        </div>
      )}
      {err && <div style={{ marginTop: 12, background: "rgba(180,60,60,0.15)", border: "1px solid rgba(180,60,60,0.3)", borderRadius: 10, padding: 14, color: "#f09090", fontSize: 14 }}>{err}</div>}
      {result && (
        <>
          <div style={{ marginTop: 16, background: "rgba(124,111,205,0.08)", border: "1px solid rgba(124,111,205,0.2)", borderRadius: 14, padding: 20 }}>
            {result.split("\n").map((line, i) => {
              if (line.startsWith("## ")) return <h3 key={i} style={{ color: "#a89fe8", fontWeight: 700, fontSize: 16, margin: "16px 0 8px" }}>{line.replace("## ", "")}</h3>;
              if (line.startsWith("«") || line.startsWith("\"")) return <p key={i} style={{ color: "#c8c0f0", fontSize: 13, fontStyle: "italic", lineHeight: 1.6, background: "rgba(255,255,255,0.04)", borderRadius: 8, padding: "10px 14px", marginTop: 12 }}>{line}</p>;
              if (!line.trim()) return <br key={i} />;
              return <p key={i} style={{ color: "#d0cce8", fontSize: 14, lineHeight: 1.7, margin: "4px 0" }}>{line}</p>;
            })}
          </div>
          {onNextWeek && (
            <button onClick={onNextWeek}
              style={{ marginTop: 16, width: "100%", padding: "14px", borderRadius: 12, background: "linear-gradient(135deg, #3a6b3a, #2d8a5a)", border: "none", color: "#fff", fontWeight: 700, fontSize: 15, cursor: "pointer", boxShadow: "0 4px 20px rgba(45,138,90,0.35)", fontFamily: "inherit" }}>
              Перейти к неделе {weekN + 1} →
            </button>
          )}
        </>
      )}
    </div>
  );
}

// ─── Week 1 ────────────────────────────────────────────────────────────────
function Week1({ data, setData, profile, onNextWeek }) {
  const diary = data.diary || {};
  const saveDiaryDay = (day, entry) => {
    const newDiary = { ...diary, [day]: entry };
    setData({ ...data, diary: newDiary });
  };

  return (
    <div>
      <InfoCard text={WEEK_DESCRIPTIONS[1]} />
      <SectionTitle>📓 Дневник сна — 7 дней</SectionTitle>
      {[1,2,3,4,5,6,7].map(d => (
        <DiaryForm key={d} day={d} existing={diary[d]} onSave={saveDiaryDay} />
      ))}
      <AIBlock weekN={1} diaryData={diary} profile={profile} onNextWeek={onNextWeek} />
    </div>
  );
}

// ─── Week 2 ────────────────────────────────────────────────────────────────
function Week2({ data, setData, profile, onNextWeek }) {
  const diary = data.diary || {};
  const checks = data.checks || {};
  const saveDiaryDay = (day, entry) => setData({ ...data, diary: { ...diary, [day]: entry } });
  const toggleCheck = (day, k) => {
    const dc = checks[day] || {};
    setData({ ...data, checks: { ...checks, [day]: { ...dc, [k]: !dc[k] } } });
  };

  const checkItems = ["Соблюдала окно сна", "Не ложилась раньше назначенного времени", "Встала в назначенное время", "Не спала днём"];

  return (
    <div>
      <InfoCard text={WEEK_DESCRIPTIONS[2]} />
      <div style={{ background: "rgba(91,141,238,0.1)", border: "1px solid rgba(91,141,238,0.25)", borderRadius: 14, padding: 18, marginBottom: 12 }}>
        <h4 style={{ color: "#5b8dee", margin: "0 0 10px", fontSize: 15 }}>💡 Механизм ограничения сна</h4>
        <p style={{ color: "#b0b8d8", fontSize: 13, lineHeight: 1.7, margin: 0 }}>
          Хроническая бессонница — это выученное поведение. Слишком долгое время в постели создаёт ассоциацию «кровать = бодрствование». Ограничение сна сжимает окно, повышает давление сна (аденозин), и за 2–3 недели восстанавливает глубокие стадии. Эффективность сна должна достичь 85%+ перед расширением окна.
        </p>
      </div>
      <div style={{ background: "rgba(196,127,58,0.1)", border: "1px solid rgba(196,127,58,0.3)", borderRadius: 12, padding: "13px 16px", marginBottom: 20, display: "flex", gap: 12, alignItems: "flex-start" }}>
        <span style={{ fontSize: 18, flexShrink: 0 }}>🚫</span>
        <div>
          <p style={{ color: "#c47f3a", fontWeight: 600, fontSize: 13, margin: "0 0 4px" }}>Дневной сон на этой неделе отменяется</p>
          <p style={{ color: "#a08060", fontSize: 13, lineHeight: 1.6, margin: 0 }}>
            Даже 20 минут днём снижают давление сна к вечеру — и разрушают весь эффект ограничения. Если очень хочется спать днём, это хороший знак: давление сна накапливается. Потерпите до назначенного времени отхода.
          </p>
        </div>
      </div>
      {[1,2,3,4,5,6,7].map(d => (
        <div key={d} style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 14, padding: 16, marginBottom: 12 }}>
          <p style={{ color: "#a89fe8", fontWeight: 600, margin: "0 0 10px" }}>День {d}</p>
          <DiaryForm day={d} existing={diary[d]} onSave={saveDiaryDay} />
          <div style={{ marginTop: 10 }}>
            {checkItems.map(item => (
              <CheckItem key={item} label={item} checked={!!(checks[d] || {})[item]} onChange={() => toggleCheck(d, item)} />
            ))}
          </div>
        </div>
      ))}
      <AIBlock weekN={2} diaryData={diary} extraData={checks} profile={profile} onNextWeek={onNextWeek} />
    </div>
  );
}

// ─── Week 3 ────────────────────────────────────────────────────────────────
function Week3({ data, setData, profile, onNextWeek }) {
  const diary = data.diary || {};
  const checks = data.checks || {};
  const saveDiaryDay = (day, entry) => setData({ ...data, diary: { ...diary, [day]: entry } });
  const toggleCheck = (day, k) => {
    const dc = checks[day] || {};
    setData({ ...data, checks: { ...checks, [day]: { ...dc, [k]: !dc[k] } } });
  };

  const checkItems = [
    "Кровать использовала только для сна и секса",
    "Встала через 20 мин если не могла заснуть",
    "Встала в фиксированное время независимо от сна",
    "При приливе: встала, охладилась, вернулась в постель только когда снова захотелось спать",
  ];

  return (
    <div>
      <InfoCard text={WEEK_DESCRIPTIONS[3]} />
      <div style={{ background: "rgba(76,168,168,0.1)", border: "1px solid rgba(76,168,168,0.25)", borderRadius: 14, padding: 18, marginBottom: 20 }}>
        <h4 style={{ color: "#4ca8a8", margin: "0 0 10px", fontSize: 15 }}>🛏️ Три правила этой недели</h4>
        {[

function ProgressBar({ value, max, color = "#7c6fcd", label }) {
  const pct = Math.round((value / max) * 100);
  return (
    <div style={{ marginBottom: 8 }}>
      {label && <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
        <span style={{ fontSize: 12, color: "#8888aa" }}>{label}</span>

      </div>}
      <div style={{ height: 6, background: "rgba(255,255,255,0.08)", borderRadius: 3, overflow: "hidden" }}>
        <div style={{ height: "100%", width: `${pct}%`, background: `linear-gradient(90deg, ${color}, ${color}cc)`, borderRadius: 3, transition: "width 0.5s ease" }} />
      </div>
    </div>
  );
}

// ─── Main App ──────────────────────────────────────────────────────────────
function SleepProgram() {
  const [state, setState] = useState(() => load());
  const [currentWeek, setCurrentWeek] = useState(1);

  const profile = state.profile || null;

  const completeOnboarding = (profileData) => {
    const next = { ...state, profile: profileData };
    setState(next);
    save(next);
  };

  const weekData = (n) => state[`w${n}`] || {};
  const setWeekData = (n) => (data) => {
    const next = { ...state, [`w${n}`]: data };
    setState(next);
    save(next);
  };

  const totalDays = Object.entries(state).filter(([k]) => k.startsWith("w")).reduce((sum, [, wd]) => sum + Object.keys(wd.diary || {}).length, 0);
  const totalProgress = Math.min(Math.round((totalDays / 42) * 100), 100);

  const allWeeksData = {};
  for (let i = 1; i <= 6; i++) allWeeksData[i] = weekData(i);

  const reset = () => {
    if (window.confirm("Сбросить все данные программы?")) {
      localStorage.removeItem(LS_KEY);
      setState({});
      setCurrentWeek(1);
    }
  };

  const weekDays = (n) => Object.keys(weekData(n).diary || {}).length;

  // Show onboarding if no profile yet
  if (!profile) return <Onboarding onComplete={completeOnboarding} />;

  return (
    <div style={{ minHeight: "100vh", background: "#0d0b1a", color: "#e8e4f5", fontFamily: "'Georgia', 'Times New Roman', serif" }}>
      <style>{`
        @keyframes spin { to { transform: rotate(360deg); } }
        * { box-sizing: border-box; }
        input[type=range] { -webkit-appearance: none; height: 6px; border-radius: 3px; background: rgba(255,255,255,0.1); }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #7c6fcd; cursor: pointer; }
        input[type=time]::-webkit-calendar-picker-indicator { filter: invert(0.7); }
        textarea { font-family: inherit; }
        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #0d0b1a; } ::-webkit-scrollbar-thumb { background: #3a3060; border-radius: 3px; }
      `}</style>

      {/* Header */}
      <div style={{ background: "linear-gradient(180deg, #1a1530 0%, #0d0b1a 100%)", borderBottom: "1px solid rgba(124,111,205,0.15)", padding: "16px 16px 14px" }}>
        <div style={{ maxWidth: 600, margin: "0 auto" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 10 }}>
            <div style={{ width: 38, height: 38, borderRadius: 10, background: "linear-gradient(135deg, #1a1550, #2d1b69)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, border: "1px solid rgba(124,111,205,0.3)" }}>🌙</div>
            <div style={{ flex: 1 }}>
              <h1 style={{ fontSize: 17, fontWeight: 700, margin: 0, color: "#e8e4f5" }}>Сон в менопаузе</h1>
              <p style={{ fontSize: 12, color: "#7070a0", margin: 0 }}>{profile.name}, {profile.age} лет · CBT-I программа</p>
            </div>
          </div>
          <ProgressBar value={totalProgress} max={100} label={`Прогресс — ${totalDays}/42 дней`} />
        </div>
      </div>

      {/* Week tabs */}
      <div style={{ maxWidth: 600, margin: "0 auto", padding: "0 16px" }}>
        <div style={{ display: "flex", gap: 6, overflowX: "auto", padding: "14px 0", scrollbarWidth: "none" }}>
          {WEEKS.map(w => {
            const active = currentWeek === w.n;
            const days = weekDays(w.n);
            return (
              <button key={w.n} onClick={() => setCurrentWeek(w.n)}
                style={{
                  flex: "0 0 auto", padding: "8px 14px", borderRadius: 10,
                  background: active ? `linear-gradient(135deg, ${w.color}40, ${w.color}20)` : "rgba(255,255,255,0.04)",
                  border: `1px solid ${active ? w.color : "rgba(255,255,255,0.08)"}`,
                  color: active ? "#fff" : "#8888aa", cursor: "pointer", fontSize: 13, fontWeight: active ? 600 : 400,
                  whiteSpace: "nowrap", fontFamily: "inherit",
                }}>
                <span style={{ marginRight: 5 }}>{w.icon}</span>
                Нед.{w.n}
                {days > 0 && <span style={{ marginLeft: 6, background: active ? w.color : "rgba(255,255,255,0.1)", borderRadius: 10, padding: "1px 6px", fontSize: 11 }}>{days}</span>}
              </button>
            );
          })}
        </div>

        {/* Week header */}
        <div style={{ background: `linear-gradient(135deg, ${WEEKS[currentWeek-1].color}15, transparent)`, border: `1px solid ${WEEKS[currentWeek-1].color}30`, borderRadius: 14, padding: "16px 18px", marginBottom: 20 }}>
          <h2 style={{ margin: "0 0 8px", fontSize: 18, color: "#e8e4f5" }}>
            {WEEKS[currentWeek-1].icon} Неделя {currentWeek}: {WEEKS[currentWeek-1].title}
          </h2>
          <ProgressBar value={weekDays(currentWeek)} max={7} color={WEEKS[currentWeek-1].color} label={`${weekDays(currentWeek)} из 7 дней заполнено`} />
        </div>

        {/* Week content — pass profile to all weeks for AI personalization */}
        {currentWeek === 1 && <Week1 data={weekData(1)} setData={setWeekData(1)} profile={profile} onNextWeek={() => setCurrentWeek(2)} />}
        {currentWeek === 2 && <Week2 data={weekData(2)} setData={setWeekData(2)} profile={profile} onNextWeek={() => setCurrentWeek(3)} />}
        {currentWeek === 3 && <Week3 data={weekData(3)} setData={setWeekData(3)} profile={profile} onNextWeek={() => setCurrentWeek(4)} />}
        {currentWeek === 4 && <Week4 data={weekData(4)} setData={setWeekData(4)} profile={profile} onNextWeek={() => setCurrentWeek(5)} />}
        {currentWeek === 5 && <Week5 data={weekData(5)} setData={setWeekData(5)} profile={profile} onNextWeek={() => setCurrentWeek(6)} />}
        {currentWeek === 6 && <Week6 allData={allWeeksData} profile={profile} data={weekData(6)} setData={setWeekData(6)} />}

        {/* Footer */}
        <div style={{ marginTop: 32, paddingTop: 20, borderTop: "1px solid rgba(255,255,255,0.06)", paddingBottom: 40 }}>
          <p style={{ fontSize: 11, color: "#555577", textAlign: "center", lineHeight: 1.6, margin: "0 0 16px" }}>{DISCLAIMER}</p>
        <div style={{ display: "flex", justifyContent: "center" }}>
          <button onClick={() => {
            const next = { ...state };
            delete next.profile;
            setState(next);
            save(next);
          }} style={{ background: "transparent", border: "1px solid rgba(124,111,205,0.2)", borderRadius: 8, padding: "8px 20px", color: "#7070a0", fontSize: 12, cursor: "pointer", fontFamily: "inherit" }}>
            Изменить профиль
          </button>
        </div>
        </div>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(SleepProgram));
</script>
</body>
</html>
